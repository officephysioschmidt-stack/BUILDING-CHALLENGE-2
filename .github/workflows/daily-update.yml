name: Daily update

# Comunio aktualisiert Marktwerte 1x taeglich ~5-6 Uhr deutscher Zeit.
# Cron laeuft in UTC: 05:42 UTC = 07:42 MESZ (Sommer) / 06:42 MEZ (Winter),
# damit auch im Winter sicher NACH dem Comunio-Update gescrapt wird.
# Krumme Minute (42), weil GitHub Cron-Jobs zu vollen/halben Stunden stark verzoegert.
on:
  schedule:
    - cron: "42 5 * * *"
  workflow_dispatch:

# Needed so the daily market-value snapshot can be committed back to the repo.
permissions:
  contents: write

jobs:
  scrape-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Scrape stats.comunio.de
        run: node scrape.mjs

      - name: Build dashboard
        run: node build-dashboard.mjs

      - name: Commit market-value history snapshot
        # A history push must never block the production deploy below.
        continue-on-error: true
        run: |
          git config user.name "comunio-scout-bot"
          git config user.email "actions@github.com"
          git add history/
          if git diff --staged --quiet; then
            echo "No history change to commit."
          else
            git commit -m "chore: market value snapshot $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Deploy to Cloudflare Pages (Production)
        run: npx wrangler pages deploy dashboard --project-name=comunio-scout --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 0bafb48c2df0935f9dda59e34a822ea8
